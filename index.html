<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaaşHesap 2026</title>

<style>
body{font-family:Arial;background:#f4f6fb;margin:0;padding:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:20px}
input,select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;font-size:14px}
button{background:#1a5cff;color:#fff;border:none;font-weight:bold;cursor:pointer}
.result{font-size:28px;font-weight:bold;margin-top:10px}
.row{display:flex;justify-content:space-between;margin-top:6px}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Maaş Hesaplama</h3>

<input type="number" id="salary" placeholder="Brüt Maaş">

<select id="mode">
<option value="brut">Brüt → Net</option>
<option value="net">Net → Brüt</option>
</select>

<button onclick="hesapla()">Hesapla</button>
</div>

<div class="card" id="resultBox" style="display:none">
<h3>Sonuç</h3>

<div class="result" id="net">-</div>

<div class="row"><span>SGK</span><span id="sgk"></span></div>
<div class="row"><span>Vergi</span><span id="vergi"></span></div>
<div class="row"><span>Damga</span><span id="damga"></span></div>

<button onclick="yazdir()">Yazdır</button>
<button onclick="kopyala()">Kopyala</button>

</div>

</div>

<script>
function hesapla(){
let brut=parseFloat(document.getElementById("salary").value);
if(!brut){alert("Maaş gir");return;}

let sgk=brut*0.15;
let vergi=(brut-sgk)*0.15;
let damga=brut*0.00759;
let net=brut-sgk-vergi-damga;

document.getElementById("net").innerText=net.toFixed(2)+" TL";
document.getElementById("sgk").innerText=sgk.toFixed(2);
document.getElementById("vergi").innerText=vergi.toFixed(2);
document.getElementById("damga").innerText=damga.toFixed(2);

document.getElementById("resultBox").style.display="block";

window.scrollTo({top:0,behavior:"smooth"});
}

function yazdir(){
let net=document.getElementById("net").innerText;
let sgk=document.getElementById("sgk").innerText;
let vergi=document.getElementById("vergi").innerText;
let damga=document.getElementById("damga").innerText;

let w=window.open("","","width=600,height=700");

w.document.write(`
<html>
<head>
<title>Çıktı</title>
<style>
body{font-family:Arial;padding:20px}
h2{text-align:center}
.row{display:flex;justify-content:space-between;margin-top:10px}
</style>
</head>
<body>

<h2>Maaş Sonuç</h2>

<h1 style="text-align:center">${net}</h1>

<div class="row"><span>SGK</span><span>${sgk}</span></div>
<div class="row"><span>Vergi</span><span>${vergi}</span></div>
<div class="row"><span>Damga</span><span>${damga}</span></div>

</body>
</html>
`);

w.document.close();
w.print();
}

function kopyala(){
let text=`
Net: ${document.getElementById("net").innerText}
SGK: ${document.getElementById("sgk").innerText}
Vergi: ${document.getElementById("vergi").innerText}
Damga: ${document.getElementById("damga").innerText}
`;

navigator.clipboard.writeText(text);
alert("Kopyalandı");
}
</script>

</body>
</html>
