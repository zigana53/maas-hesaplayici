<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaaşHesap - Net ve Brüt Maaş Hesaplama 2026</title>

<meta name="description" content="Türkiye için net maaş, brüt maaş, SGK ve gelir vergisi hesaplama aracı. 2026 güncel verileriyle ücretsiz hesaplama.">

<link rel="canonical" href="https://zigana53.github.io/maas-hesaplayici/index.html">

<meta property="og:type" content="website">
<meta property="og:title" content="MaaşHesap - Net Maaş Hesaplama">
<meta property="og:url" content="https://zigana53.github.io/maas-hesaplayici/index.html">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<style>
body{font-family:DM Sans,sans-serif;margin:0;background:#f2f5fb}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
input,button{padding:10px;font-size:16px;width:100%;margin-top:10px}
button{background:#1a5cff;color:#fff;border:none;cursor:pointer}
.result{font-size:22px;margin-top:15px}
.ad-box{width:300px;height:250px;background:#eee;display:flex;align-items:center;justify-content:center;margin:20px auto;border-radius:8px}
</style>

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"WebSite",
 "name":"MaaşHesap",
 "url":"https://zigana53.github.io/maas-hesaplayici/"
}
</script>

</head>

<body>

<div class="container">

<div class="card">
<h2>Maaş Hesaplama</h2>

<input type="number" id="brut" placeholder="Brüt maaş gir">

<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc"></div>
</div>

<!-- REKLAM -->

<div class="ad-box">
Reklam Alanı - 300x250
</div>

</div>

<script>
function hesapla(){
let brut=document.getElementById("brut").value;
if(!brut)return;

let sgk=brut*0.15;
let vergi=(brut-sgk)*0.15;
let net=brut-sgk-vergi;

document.getElementById("sonuc").innerHTML="Net Maaş: "+net.toFixed(2)+" TL";
}
</script>

</body>
</html>
